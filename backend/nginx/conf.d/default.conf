# PHASE 1 — HTTP (fonctionne dès le premier `docker compose up`).
# Sert l'API en HTTP + expose le challenge ACME pour obtenir le certificat.
# Une fois le certificat émis, basculez sur la config HTTPS :
#   voir DEPLOYMENT.md → « Activer HTTPS » (remplace ce fichier par default-ssl.conf.example).

server {
    listen 80;
    listen [::]:80;
    server_name backend.website.horus-lab.com;

    # Validation Let's Encrypt (certbot écrit ici via le volume certbot-www).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Fichiers statiques de l'admin Django (collectstatic).
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    # Fichiers uploadés depuis l'admin (couvertures, photos d'équipe, logos…).
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    # API + admin Django.
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;   # autorise l'upload d'images depuis l'admin
    }
}
