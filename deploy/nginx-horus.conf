# ==============================================================================
# Horus-Lab — blocs serveur à AJOUTER dans ton reverse proxy Nginx EXISTANT
# (le conteneur qui sert déjà tes autres projets sur les ports 80/443).
#
# ⚠️ NE lance PAS un 2e Nginx : conflit de ports 80/443 -> tu casserais tes
#    autres sites. On se BRANCHE sur le proxy existant.
#
# ── Pré-requis (proxy en CONTENEUR) ──────────────────────────────────────────
#  Nos conteneurs `horus_web` / `horus_frontend` rejoignent le réseau de ton
#  proxy via docker-compose.prod.yml (network `proxy`, nom = PROXY_NETWORK du .env).
#  Ils sont donc joignables PAR NOM depuis le proxy. Rien d'autre à connecter.
#  (Vérifie : `docker network inspect <PROXY_NETWORK>` doit lister horus_web +
#   horus_frontend + le conteneur de ton proxy.)
#
# ── TLS ──────────────────────────────────────────────────────────────────────
#  Émets le certificat des 3 noms avec TON mécanisme certbot habituel (le même
#  que pour tes autres domaines), puis adapte les chemins ssl_certificate.
# ==============================================================================

# --- HTTP : challenge ACME (renouvellement) + redirection vers HTTPS (3 noms) ---
server {
    listen 80;
    server_name horus-lab.com www.horus-lab.com api.horus-lab.com;

    location /.well-known/acme-challenge/ {
        root <TON_WEBROOT_ACME>;      # ex. /var/www/certbot (celui de ton proxy)
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS : site public (horus-lab.com + www) -> frontend Next ---
server {
    listen 443 ssl;
    http2 on;
    server_name horus-lab.com www.horus-lab.com;

    ssl_certificate     /etc/letsencrypt/live/horus-lab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horus-lab.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=15768000" always;

    location / {
        proxy_pass http://horus_frontend:3000;     # nom de conteneur (réseau proxy)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # ce bloc termine le TLS
    }
}

# --- HTTPS : API + admin (api.horus-lab.com) -> web Django ---
# L'app sert elle-même /static (WhiteNoise) et /media (voir config/urls.py),
# donc un unique proxy_pass suffit : pas de volume à monter dans le proxy.
server {
    listen 443 ssl;
    http2 on;
    server_name api.horus-lab.com;

    ssl_certificate     /etc/letsencrypt/live/horus-lab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horus-lab.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=15768000" always;

    client_max_body_size 25m;                       # upload d'images depuis l'admin

    location / {
        proxy_pass http://horus_web:8000;           # nom de conteneur (réseau proxy)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
