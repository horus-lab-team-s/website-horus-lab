# ==============================================================================
# Horus-Lab — blocs serveur à AJOUTER dans le reverse proxy Nginx EXISTANT
# (conteneur `backend-nginx-1`, projet afrikamode, qui sert déjà 80/443).
#
# Déploiement : ce fichier est copié dans le conteneur nginx à
#   /etc/nginx/conf.d/horus.conf  puis  `nginx -t && nginx -s reload`.
#   (nginx charge tout /etc/nginx/conf.d/*.conf)
#
# Valeurs RÉELLES du VPS (relevées via `nginx -T` / `docker inspect`) :
#   - webroot ACME .......... /var/www/certbot         (volume backend_certbot_www)
#   - certificats ........... /etc/letsencrypt/...      (volume backend_certbot_certs)
#   - certificat horus ...... /etc/letsencrypt/live/horus-lab.com/ (3 noms)
#   - upstreams par NOM ..... horus_frontend:3000 / horus_web:8000 (réseau backend_default)
#
# Motif `resolver 127.0.0.11` + `set $up` (comme gathe-finance.conf) : nginx
# ré-résout les noms à l'exécution -> un `up -d` qui recrée horus_web/horus_frontend
# (nouvelle IP) NE casse PAS le proxy, aucun reload nécessaire après un redéploiement.
# ==============================================================================

# --- HTTP : challenge ACME (renouvellement) + redirection vers HTTPS (3 noms) ---
server {
    listen 80;
    listen [::]:80;
    server_name horus-lab.com www.horus-lab.com api.horus-lab.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS : site public (horus-lab.com + www) -> frontend Next ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name horus-lab.com www.horus-lab.com;

    ssl_certificate     /etc/letsencrypt/live/horus-lab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horus-lab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;
    client_max_body_size 25m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    location / {
        set $up http://horus_frontend:3000;
        proxy_pass $up;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS : API + admin (api.horus-lab.com) -> web Django ---
# L'app sert elle-même /static (WhiteNoise) et /media (config/urls.py) : un seul
# proxy_pass suffit, aucun volume à monter dans le proxy.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.horus-lab.com;

    ssl_certificate     /etc/letsencrypt/live/horus-lab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/horus-lab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;
    client_max_body_size 25m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    location / {
        set $up http://horus_web:8000;
        proxy_pass $up;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
