# CI/CD — Backend Django.
# Push sur main touchant backend/** -> build image -> push GHCR -> (si activé) deploy VPS.
name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch: {}   # permet un déclenchement manuel depuis l'onglet Actions

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/horus-lab-team-s/horus-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # pour pousser sur GHCR avec GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags latest + sha court)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Ne déploie QUE si la variable DEPLOY_ENABLED du dépôt vaut "true"
    # (on l'active à la toute fin, cf. RESTE-A-FAIRE.md étape 8).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: SSH -> pull & up (service web)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d web
            docker image prune -f
