# CI/CD — Frontend Next.js.
# Push sur main touchant frontend/** -> build image -> push GHCR -> (si activé) deploy VPS.
name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch: {}

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/horus-lab-team-s/horus-frontend
  # Connu AU BUILD : next.config s'en sert pour autoriser next/image à charger
  # les médias uploadés depuis Django (doit être l'URL PUBLIQUE du backend).
  BACKEND_API_URL: https://api.horus-lab.com

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Driver `docker-container` : requis pour le cache GHA (type=gha) utilisé
      # plus bas. Sans lui, buildx tombe sur le driver `docker` par défaut qui
      # ne sait pas exporter de cache -> "Cache export is not supported".
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags latest + sha court)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            BACKEND_API_URL=${{ env.BACKEND_API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: SSH -> pull & up (service frontend)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
            docker image prune -f
