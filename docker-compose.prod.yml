# Stack de PRODUCTION Horus-Lab — à lancer sur le VPS Contabo.
#
# ⚠️ Le VPS héberge DÉJÀ d'autres projets derrière un reverse proxy Nginx EN
# CONTENEUR (ports 80/443). Ce stack ne lance donc NI Nginx NI certbot : `web` et
# `frontend` rejoignent le RÉSEAU Docker de ton proxy (variable PROXY_NETWORK) et
# y sont joignables par NOM (horus_web:8000 / horus_frontend:3000). C'est ton
# proxy existant (conteneur `backend-nginx-1`) qui termine le TLS et route
# horus-lab.com / api.horus-lab.com vers eux (voir deploy/nginx-horus.conf).
#
# ⚠️ BASE PARTAGÉE : ce stack ne lance PAS son propre PostgreSQL. Il RÉUTILISE le
# conteneur postgres déjà en marche `backend-db-1` (variable POSTGRES_HOST),
# joignable PAR NOM sur le réseau du proxy. On y crée une base + un rôle DÉDIÉS
# `horuslab` (voir RESTE-A-FAIRE.md). Couplage assumé : ne fais JAMAIS
# `docker compose down -v` sur le projet propriétaire de `backend-db-1` (ça
# effacerait aussi notre base). Nos données uploadées, elles, vivent dans les
# volumes `media`/`static` ci-dessous, indépendants de leur projet.
#
# Le réseau `proxy` est déclaré `external` : ainsi, même quand un conteneur est
# recréé lors d'un redéploiement, il REJOINT automatiquement le proxy (pas de
# `docker network connect` manuel à refaire).
#
# Les images `web` et `frontend` sont pré-construites par GitHub Actions et
# tirées depuis GHCR. Toutes les valeurs sensibles viennent de .env (chmod 600) :
# copier stack.env.example -> .env et le remplir.

services:
  web:
    container_name: horus_web        # nom stable : le proxy route dessus par ce nom
    image: ${BACKEND_IMAGE:-ghcr.io/horus-lab-team-s/horus-backend:latest}
    restart: unless-stopped
    env_file: .env
    environment:
      # Base RÉUTILISÉE : conteneur postgres existant (POSTGRES_HOST=backend-db-1),
      # joignable par nom sur le réseau `proxy`. Rôle + base DÉDIÉS `horuslab`
      # (POSTGRES_PASSWORD = mot de passe de CE rôle, pas celui de leur base).
      DATABASE_URL: postgresql://${POSTGRES_USER:-horuslab}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-backend-db-1}:5432/${POSTGRES_DB:-horuslab}
    volumes:
      - media:/app/media          # fichiers uploadés (couvertures, photos, logos)
      - static:/app/staticfiles   # statiques admin (collectstatic)
    networks: [proxy]                # réseau où vivent le proxy ET backend-db-1
    ports:
      # Facultatif : boucle locale, utile seulement pour déboguer depuis le VPS
      # (curl 127.0.0.1:8082). Ton proxy, lui, passe par le réseau `proxy`.
      # Change/retire le port si 8082 est déjà pris par un autre projet.
      - "127.0.0.1:${BACKEND_PORT:-8082}:8000"

  frontend:
    container_name: horus_frontend
    image: ${FRONTEND_IMAGE:-ghcr.io/horus-lab-team-s/horus-frontend:latest}
    restart: unless-stopped
    env_file: .env               # BREVO_*, GROQ_* lus par les routes /api/* de Next
    environment:
      # URL PUBLIQUE du backend : sert au SSR ET à construire les URLs des médias
      # (next/image, chargées par le navigateur) -> doit rester le domaine public.
      BACKEND_API_URL: ${BACKEND_API_URL:-https://api.horus-lab.com}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://horus-lab.com}
    depends_on:
      - web
    networks: [proxy]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8081}:3000"

networks:
  # Réseau EXISTANT de ton reverse proxy conteneur, où tourne AUSSI `backend-db-1`.
  # Mets son nom dans .env :  PROXY_NETWORK=<nom>  (souvent `backend_default`,
  # à confirmer avec: docker network ls / docker inspect backend-db-1).
  # ⚠️ Si `backend-db-1` et le proxy sont sur des réseaux DIFFÉRENTS, ajoute le
  #    réseau de la base ici et dans `networks:` de `web`.
  proxy:
    external: true
    name: ${PROXY_NETWORK}

volumes:
  media:
  static:
