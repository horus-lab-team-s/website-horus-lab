<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Horus-Lab Formation">
  <defs>
    <linearGradient id="hlf-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b4f9c"/>
      <stop offset="1" stop-color="#0f2a5e"/>
    </linearGradient>
    <linearGradient id="hlf-cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5bb8e8"/>
      <stop offset="1" stop-color="#2196f3"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" rx="44" fill="url(#hlf-bg)"/>

  <!-- Toque de diplômé -->
  <g transform="translate(120 86)">
    <polygon points="0,-30 64,-6 0,18 -64,-6" fill="url(#hlf-cap)"/>
    <polygon points="0,-30 64,-6 0,18 -64,-6" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.35"/>
    <!-- base de la toque -->
    <path d="M-34,4 L-34,30 C-34,44 34,44 34,30 L34,4 L0,18 Z" fill="#84b6f4"/>
    <path d="M-34,4 L-34,30 C-34,44 34,44 34,30 L34,4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <!-- pompon -->
    <line x1="64" y1="-6" x2="64" y2="34" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="64" cy="40" r="6" fill="#ffffff"/>
    <!-- oeil d'Horus stylisé au centre de la toque -->
    <circle cx="0" cy="-6" r="6" fill="#0f2a5e"/>
    <circle cx="0" cy="-6" r="2.4" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="168" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    horus<tspan fill="#5bb8e8">-lab</tspan>
  </text>
  <text x="120" y="196" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#84b6f4" letter-spacing="5">FORMATION</text>
</svg>
